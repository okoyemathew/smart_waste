{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Smart Waste">
    <title>Smart Waste Management</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="{% block body_class %}bg-default{% endblock %}">

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark app-navbar">
        <div class="container">
            <a class="navbar-brand" href="{% url 'landing' %}">Smart Waste System</a>
        </div>
    </nav>
    {% if messages %}
    <div class="container mt-3">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags|default:'info' }}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <div class="container mt-5 page-shell">
        {% block content %}
        {% endblock %}
    </div>

    <script>
    window.addEventListener('pageshow', function (event) {
        if (event.persisted) {
            window.location.reload();
        }
    });

    function canAutoRefreshPage() {
        var active = document.activeElement;
        var editingTags = ['INPUT', 'TEXTAREA', 'SELECT'];

        if (typeof document.hidden !== 'undefined' && document.hidden) {
            return false;
        }

        if (active && editingTags.indexOf(active.tagName) !== -1) {
            return false;
        }

        return true;
    }
    </script>
    {% block auto_refresh %}{% endblock %}
</body>

</html>
