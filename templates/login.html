{% extends 'base.html' %}
{% block body_class %}bg-default{% endblock %}

{% block content %}

<section class="auth-landing">
    <div class="auth-copy">
        <h1>Welcome back to Smart Waste System</h1>
        <p>
            Track complaints, manage waste reports, and stay connected with the teams
            working to keep your area clean.
        </p>
    </div>

    <div class="card auth-card p-4 shadow mx-auto w-100">
        <h3 class="text-center mb-3">Login</h3>

        <form method="POST">
            {% csrf_token %}

            <input class="form-control mb-3" type="text" name="username" placeholder="Username" required>
            <input class="form-control mb-3" type="password" name="password" placeholder="Password" required>

            <button class="btn btn-primary w-100">Login</button>
        </form>

        <p class="text-center mt-3">
            <a href="/register/">Create Account</a>
        </p>
    </div>
</section>

{% endblock %}
